<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIQLO Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">
            <h1>UNIQLO</h1>
            <p>LifeWear</p>
        </div>

        <div class="search">
            <input type="text" placeholder="What are you looking for?">
        </div>

        <div class="icons">
            <span>[ACC]</span>
            <span>[CART]</span>
            <span>[MENU]</span>
        </div>
    </header>

    <nav>
        <a href="#">MEN</a>
        <a href="#">WOMEN</a>
        <a href="#">KIDS</a>
        <a href="#">BABY</a>
    </nav>

    <section class="cart">

        <h2>CART</h2>

        <div class="cart-item">

            <img src="shirt.jpg" alt="Shirt">

            <div>
                <h3>Raglan T-Shirt</h3>
                <p>Size: Men L</p>
                <p>RM 49.90</p>
                <p>Quantity: 1</p>
            </div>

        </div>

        <div class="total">
            <h2>Total</h2>
            <h1>RM 49.90</h1>
        </div>

        <button class="checkout-btn">CHECKOUT</button>

    </section>

    <footer>
        <div>
            <h4>About UNIQLO</h4>
        </div>

        <div>
            <h4>Information</h4>
            <p>Store Locator</p>
            <p>Careers</p>
        </div>

        <div>
            <h4>Help</h4>
            <p>FAQ</p>
            <p>Return Policy</p>
            <p>Privacy Policy</p>
        </div>

        <div>
            <h4>Accessibility</h4>
            <p>Bulk Purchase</p>
        </div>

        <div>
            <h4>Profile</h4>
            <p>Membership</p>
            <p>Coupons</p>
        </div>
    </footer>

</body>
</html>
